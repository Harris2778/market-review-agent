name: report-crawler-daily

# 研报库每日增量抓取（研报库 v3 自动化）。
# 数据源全部免登录免费（东财 reportapi / 慧博列表 / 证券之星 / 洞见 API），
# 全程无需任何 secret；失败自动建 issue 告警（采集纪律：每日任务需失败告警）。

on:
  schedule:
    # 每天 13:23 UTC = 北京时间 21:23（当日研报晚间已基本出齐）
    - cron: "23 13 * * *"
  workflow_dispatch:

# 防重叠：同一 workflow 串行排队（不取消在跑的，保证每日必跑一轮）
concurrency:
  group: report-crawler-daily
  cancel-in-progress: false

permissions:
  contents: read
  issues: write # schedule 失败时 github-script 建 issue 用

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 缓存键按 ISO 年周：当周命中精确 key，跨周经 restore-keys 前缀兜底
      # 还原上一周快照；爬虫按 --days 增量 upsert，恢复快照不丢历史数据
      - name: Compute year-week cache key
        id: week
        run: echo "yearweek=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache reports.db
        uses: actions/cache@v4
        with:
          path: data/reports.db
          key: reports-db-${{ steps.week.outputs.yearweek }}
          restore-keys: |
            reports-db-

      - name: Run daily incremental crawl
        run: bash scripts/daily_report_update.sh 1

      - name: Upload reports.db artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: reports-db
          path: data/reports.db
          retention-days: 7

      # 仅定时触发且失败时自动建 issue（手动触发失败由操作人自行处理）
      - name: Open issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const day = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}` +
              `/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `研报每日抓取失败（${day}）`,
              labels: ["report-crawler"],
              body: [
                `每日研报增量抓取任务（report-crawler-daily）失败，请检查运行日志：`,
                ``,
                runUrl,
              ].join("\n"),
            });
