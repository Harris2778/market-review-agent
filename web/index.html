<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="data:,">
  <title>Fine</title>
  <script src="/static/theme-init.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- ============ 未登录：登录 / 注册 ============ -->
  <div id="auth-view" class="auth-view" hidden>
    <div class="auth-card">
      <!-- 品牌 hero：Fine 大字标 + 复古小电脑 + 视差 -->
      <div class="hero hero-auth" id="hero-auth" aria-hidden="true">
        <div class="hero-stage">
          <span class="hero-layer hero-ch" data-depth="0.35">F</span><span class="hero-layer hero-i" data-depth="0.35"><span class="hero-dot" data-depth="1.5"><span class="hero-ball"></span></span>ı</span><span class="hero-layer hero-pc" data-depth="0.9"><svg viewBox="0 0 96 80" role="img" aria-label="retro computer">
              <rect class="pc-body" x="14" y="6" width="68" height="50" rx="7"/>
              <rect class="pc-screen" x="22" y="14" width="52" height="34" rx="3"/>
              <circle class="pc-eye" cx="41" cy="30" r="3.4"/>
              <circle class="pc-eye" cx="55" cy="30" r="3.4"/>
              <rect class="pc-mouth" x="44" y="38" width="8" height="2.4" rx="1.2"/>
              <rect class="pc-stand" x="40" y="58" width="16" height="5" rx="2"/>
              <rect class="pc-kb" x="8" y="66" width="80" height="9" rx="4.5"/>
              <rect class="pc-key" x="20" y="69" width="24" height="3" rx="1.5"/>
              <rect class="pc-key" x="52" y="69" width="24" height="3" rx="1.5"/>
            </svg></span><span class="hero-layer hero-ch" data-depth="0.35">n</span><span class="hero-layer hero-ch" data-depth="0.35">e</span>
        </div>
      </div>
      <p class="auth-subtitle">金融智能体</p>

      <div class="auth-tabs" role="tablist">
        <button type="button" id="tab-login" class="auth-tab active" role="tab">登录</button>
        <button type="button" id="tab-register" class="auth-tab" role="tab">注册</button>
      </div>

      <form id="auth-form" autocomplete="off">
        <label class="field">
          <span class="field-label">用户名</span>
          <input type="text" id="auth-username" required maxlength="64" placeholder="请输入用户名">
        </label>
        <label class="field">
          <span class="field-label">密码</span>
          <input type="password" id="auth-password" required maxlength="128" placeholder="请输入密码">
        </label>
        <p id="auth-error" class="auth-error" hidden></p>
        <button type="submit" id="auth-submit" class="btn btn-primary btn-block">登录</button>
      </form>
    </div>
  </div>

  <!-- ============ 已登录：主界面 ============ -->
  <div id="app-view" class="app-view" hidden>

    <!-- 左侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-brand">Fine</div>

      <div class="sidebar-top">
        <button type="button" id="new-chat-btn" class="btn btn-newchat btn-block">
          <svg class="newchat-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor"
               stroke-width="1.4" stroke-linecap="round" aria-hidden="true">
            <path d="M8 13.2c3.2 0 5.8-2.1 5.8-4.7S11.2 3.8 8 3.8 2.2 5.9 2.2 8.5c0 1.1.5 2.2 1.3 3l-.6 1.7H8z"/>
            <path d="M8 6.4v4.2M5.9 8.5h4.2"/>
          </svg>
          <span>新对话</span>
        </button>
      </div>

      <nav class="conv-list-wrap">
        <ul id="conv-list" class="conv-list"></ul>
        <p id="conv-empty" class="conv-empty" hidden>暂无对话</p>
      </nav>

      <div class="user-bar">
        <div class="user-bar-row">
          <span class="user-name" id="user-name">—</span>
          <button type="button" id="theme-toggle" class="icon-text-btn" title="切换深浅色主题">
            <svg class="theme-icon-moon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M13.4 9.7A5.6 5.6 0 0 1 6.3 2.6a5.6 5.6 0 1 0 7.1 7.1z"/>
            </svg>
            <svg class="theme-icon-sun" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                 stroke-width="1.4" stroke-linecap="round" aria-hidden="true">
              <circle cx="8" cy="8" r="3"/>
              <path d="M8 1.4v1.6M8 13v1.6M1.4 8H3M13 8h1.6M3.3 3.3l1.2 1.2M11.5 11.5l1.2 1.2M12.7 3.3l-1.2 1.2M4.5 11.5l-1.2 1.2"/>
            </svg>
          </button>
          <button type="button" id="logout-btn" class="btn btn-ghost btn-sm" title="退出登录">退出</button>
        </div>
        <div class="quota-row" id="quota-row" title="查看额度详情">
          <div class="quota-track" title="本月额度使用情况">
            <div class="quota-fill" id="quota-fill"></div>
          </div>
          <span class="quota-text" id="quota-text">—</span>
        </div>
        <p class="quota-reset-inline" id="quota-reset-inline"></p>
        <button type="button" id="admin-entry-btn" class="btn btn-ghost btn-sm user-bar-link hidden" hidden>管理</button>
      </div>
    </aside>

    <!-- 移动端抽屉遮罩 -->
    <div id="sidebar-mask" class="sidebar-mask hidden" hidden></div>

    <!-- 主区域 -->
    <main class="main">

      <!-- 移动端汉堡按钮（≤768px 显示） -->
      <button type="button" id="menu-toggle" class="icon-text-btn menu-toggle" title="打开侧边栏">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" aria-hidden="true">
          <path d="M2.5 4.5h11M2.5 8h11M2.5 11.5h11"/>
        </svg>
      </button>

      <!-- 聊天视图 -->
      <div id="chat-view" class="chat-view">
        <div id="quota-banner" class="quota-banner" hidden>
          <span id="quota-banner-text">本月额度已用完</span>
        </div>

        <div id="messages" class="messages"></div>

        <!-- 空状态：hero 大字标 + 问候 + 居中大输入卡片 -->
        <div id="welcome" class="welcome" hidden>
          <div class="hero hero-welcome" id="hero-welcome" aria-hidden="true">
            <div class="hero-stage">
              <span class="hero-layer hero-ch" data-depth="0.35">F</span><span class="hero-layer hero-i" data-depth="0.35"><span class="hero-dot" data-depth="1.5"><span class="hero-ball"></span></span>ı</span><span class="hero-layer hero-pc" data-depth="0.9"><svg viewBox="0 0 96 80" role="img" aria-label="retro computer">
                  <rect class="pc-body" x="14" y="6" width="68" height="50" rx="7"/>
                  <rect class="pc-screen" x="22" y="14" width="52" height="34" rx="3"/>
                  <circle class="pc-eye" cx="41" cy="30" r="3.4"/>
                  <circle class="pc-eye" cx="55" cy="30" r="3.4"/>
                  <rect class="pc-mouth" x="44" y="38" width="8" height="2.4" rx="1.2"/>
                  <rect class="pc-stand" x="40" y="58" width="16" height="5" rx="2"/>
                  <rect class="pc-kb" x="8" y="66" width="80" height="9" rx="4.5"/>
                  <rect class="pc-key" x="20" y="69" width="24" height="3" rx="1.5"/>
                  <rect class="pc-key" x="52" y="69" width="24" height="3" rx="1.5"/>
                </svg></span><span class="hero-layer hero-ch" data-depth="0.35">n</span><span class="hero-layer hero-ch" data-depth="0.35">e</span>
            </div>
          </div>
          <p class="welcome-sub">你好，我是 Fine，有什么可以帮你？</p>
          <div id="composer-center-slot" class="composer-slot"></div>
        </div>

        <div id="composer-bottom-slot" class="composer-slot composer-slot-bottom">
          <!-- 大输入卡片（Kimi 风格）：textarea + 右下角圆形发送键 -->
          <div id="composer" class="composer">
            <textarea id="input" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
            <div class="composer-actions">
              <button type="button" id="stop-btn" class="icon-btn" hidden title="停止生成">■</button>
              <button type="button" id="send-btn" class="icon-btn" title="发送" disabled>↑</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 额度视图（独立页面） -->
      <section id="quota-view" class="quota-view" hidden>
        <div class="quota-page">
          <div class="quota-head">
            <button type="button" id="quota-back-btn" class="btn btn-ghost btn-sm">← 返回</button>
            <h2 class="quota-title">我的额度</h2>
          </div>

          <div class="quota-card">
            <div class="quota-card-label">月度额度</div>
            <div class="quota-big"><span id="quota-big-num">—</span><span class="quota-unit">条</span></div>
            <div class="quota-bar-row">
              <div class="quota-bar"><div class="quota-bar-fill" id="quota-bar-fill"></div></div>
              <span class="quota-bar-text" id="quota-bar-text">已用 0 / 100 条</span>
            </div>
            <p class="quota-note" id="quota-reset-note">月度额度将于次月1日重置</p>
          </div>
        </div>
      </section>

      <!-- 管理视图（仅 is_admin 可见入口） -->
      <section id="admin-view" class="admin-view" hidden>
        <div class="admin-page">
          <div class="quota-head">
            <button type="button" id="admin-back-btn" class="btn btn-ghost btn-sm">← 返回</button>
            <h2 class="quota-title">管理</h2>
          </div>

          <!-- 用户列表 -->
          <div id="admin-users-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>用户名</th><th>注册时间</th><th>本周期用量</th><th>重置日期</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="admin-tbody"></tbody>
            </table>
            <p id="admin-empty" class="conv-empty" hidden>暂无用户</p>
          </div>

          <!-- 某用户提问列表 -->
          <div id="admin-questions" hidden>
            <div class="quota-head">
              <button type="button" id="questions-back-btn" class="btn btn-ghost btn-sm">← 返回用户列表</button>
              <h3 class="questions-title" id="questions-title">提问记录</h3>
            </div>
            <ul id="questions-list" class="questions-list"></ul>
            <p id="questions-empty" class="conv-empty" hidden>暂无提问记录</p>
            <button type="button" id="questions-more" class="btn btn-ghost btn-block questions-more" hidden>加载更多</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- ============ 对话条目操作菜单（全局浮层） ============ -->
  <div id="conv-menu" class="conv-menu hidden" hidden>
    <button type="button" id="menu-rename" class="conv-menu-item">✏️ 编辑标题</button>
    <button type="button" id="menu-pin" class="conv-menu-item">📌 置顶</button>
    <button type="button" id="menu-delete" class="conv-menu-item danger">🗑 删除</button>
  </div>

  <script src="/static/markdown.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
